name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98 # v4.x

      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.x
        with:
          key: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          if [ -f "target/${{ matrix.target }}/release/weave-patch-mcp" ]; then
            cd "target/${{ matrix.target }}/release"
          else
            cd "target/release"
          fi
          tar czf ../../../weave-patch-mcp-${{ github.ref_name }}-${{ matrix.target }}.tar.gz weave-patch-mcp

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          if [ -f "target/${{ matrix.target }}/release/weave-patch-mcp.exe" ]; then
            cd "target/${{ matrix.target }}/release"
          else
            cd "target/release"
          fi
          7z a ../../../weave-patch-mcp-${{ github.ref_name }}-${{ matrix.target }}.zip weave-patch-mcp.exe

      - name: Upload artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v4.x
        with:
          name: binary-${{ matrix.target }}
          path: weave-patch-mcp-${{ github.ref_name }}-*

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98 # v4.x

      - name: Download all artifacts
        uses: actions/download-artifact@484a0b528fb4d7bd804637ccb632e47a0e638317 # v4.x
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@da05d552573ad5aba039eaac05058a918a7bf631 # v2.6.1
        with:
          files: artifacts/*
          generate_release_notes: true

  publish-npm:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98 # v4.x

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v4.x
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Update npm package version
        working-directory: npm
        run: npm version ${{ github.ref_name }} --no-git-tag-version --allow-same-version || true

      - name: Publish to npm
        working-directory: npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
