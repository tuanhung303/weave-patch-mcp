name: Bump Version

on:
  workflow_dispatch:
    inputs:
      bump_type:
        description: 'Type of version bump'
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98 # v4.x
        with:
          fetch-depth: 0  # Fetch full history for proper push

      - name: Configure git user
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Install cargo-edit
        run: cargo install cargo-edit

      - name: Bump cargo version
        run: |
          cargo set-version --bump ${{ github.event.inputs.bump_type }}

      - name: Read new version
        id: new_version
        run: |
          NEW_VERSION=$(grep '^version = ' Cargo.toml | head -n 1 | cut -d '"' -f 2)
          echo "NEW_VERSION=$NEW_VERSION" >> $GITHUB_OUTPUT

      - name: Bump npm package
        run: |
          cd npm && npm version ${{ steps.new_version.outputs.NEW_VERSION }} --no-git-tag-version --allow-same-version

      - name: Cargo check (update lockfile)
        run: cargo check

      - name: Commit changes
        run: |
          git add -A
          git commit -am "chore: bump version to ${{ steps.new_version.outputs.NEW_VERSION }}" || echo "No changes to commit"

      - name: Create tag
        run: |
          NEW_VERSION=${{ steps.new_version.outputs.NEW_VERSION }}
          git tag v$NEW_VERSION || echo "Tag already exists"

      - name: Push commit and tag
        env:
          GIT_HTTP_USER: ${{ secrets.GITHUB_ACTOR }}
        run: |
          git pull --rebase origin main
          git push origin main
          git push origin v${{ steps.new_version.outputs.NEW_VERSION }}
